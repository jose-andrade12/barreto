<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA - Inteligência do Andrade</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Novo Fundo Dourado em Degradê */
            background: linear-gradient(135deg, #FFDF00 0%, #D4AF37 50%, #996515 100%); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 26px;
            /* Sombra no texto para leitura perfeita no fundo claro */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }

        .wrapper { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 40px; margin-top: 20px; }
        
        .painel-container { background: #2e7d32; padding: 25px; border-radius: 20px; border: 4px solid #1b5e20; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .clover-side { width: 100%; max-width: 350px; }
        
        /* Animação Mágica do Trevo Brilhando */
        @keyframes brilharTrevo {
            0% { 
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 0 0 20px #FFDF00; 
                transform: scale(1); 
            }
            100% { 
                box-shadow: 0 0 30px rgba(255, 255, 255, 1), 0 0 50px #FFF; 
                transform: scale(1.04); 
            }
        }

        .clover-img { 
            width: 100%; 
            height: auto; 
            border-radius: 20px;
            /* Aplica a animação de brilho e pulso */
            animation: brilharTrevo 1.5s infinite alternate ease-in-out;
        }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #tela-resultado { display: none; background: white; color: black; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; width: 100%; max-width: 500px; box-sizing: border-box; margin-left: auto; margin-right: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .linha-jogo { border-bottom: 1px solid #ddd; padding: 8px; font-family: monospace; font-size: 16px; }
        .numero { color: #2e7d32; font-weight: bold; }

        /* Estilo dos Novos Botões */
        .btn-zap { background: #25D366; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-caixa { background: #005CA9; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-voltar { background: #eee; color: #333; border: 1px solid #ccc; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column-reverse; gap: 30px; }
            .painel-container { padding: 15px; max-width: 100%; }
            .clover-side { max-width: 250px; }
            body { padding: 15px; }
            .btn { padding: 20px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <h1>🍀 IA - Inteligência do Andrade</h1>

    <div class="wrapper">
        <div class="painel-container">
            <button class="btn" style="background:#4a148c" onclick="iniciar('Quina', 80, 5, 15)">QUINA</button>
            <button class="btn" style="background:#2e7d32" onclick="iniciar('MegaSena', 60, 6, 20)">MEGA SENA</button>
            <button class="btn" style="background:#311b92" onclick="iniciar('Milionaria', 50, 6, 12)">MILIONÁRIA</button>
            <button class="btn" style="background:#ef6c00" onclick="iniciar('Lotomania', 100, 50, 50)">LOTOMANIA</button>
            <button class="btn" style="background:#fbc02d; color:black" onclick="iniciar('Timemania', 80, 10, 10)">TIMEMANIA</button>
            <button class="btn" style="background:#c62828" onclick="iniciar('DuplaSena', 50, 6, 15)">DUPLA SENA</button>
            <button class="btn" style="background:#7b1fa2" onclick="iniciar('Lotofacil', 25, 15, 20)">LOTOFÁCIL</button>
        </div>

        <div class="clover-side">
            <img src="trevo.png" alt="Trevo do Andrade" class="clover-img">
        </div>
    </div>

    <div id="tela-resultado">
        <h2 id="titulo-res">Resultado</h2>
        <div id="conteudo-res"></div>
        <hr>
        <h3>Total do Bolão: <span id="total-geral" style="color:green"></span></h3>
        
        <button class="btn-zap" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>
        <button class="btn-caixa" onclick="abrirCaixa()">🎰 Jogar no Site da Caixa</button>
        <button class="btn-voltar" onclick="voltar()">Voltar para Loterias</button>
    </div>

    <script>
        const times = ["ABC/RN","ALTOS/PI","AMAZONAS/AM","AMERICA/MG","AMERICA/RN","APARECIDENSE/GO","ATHLETIC CLUB/MG","ATHLETICO/PR","ATLETICO/GO","ATLETICO/MG","AVAI/SC","BAHIA/BA","BAHIA DE FEIRA/BA","BOTAFOGO/PB","BOTAFOGO/RJ","BOTAFOGO/SP","BRAGANTINO/SP","BRASIL DE PELOTAS/RS","BRASILIENSE/DF","BRUSQUE/SC","CAMPINENSE/PB","CASCAVEL/PR","CAXIAS/RS","CEARA/CE","CEILANDIA ESPORTE/DF","CHAPECOENSE/SC","CONFIANCA/SE","CORINTHIANS/SP","CORITIBA/PR","CRB/AL","CRICIUMA/SC","CRUZEIRO/MG","CSA/AL","CUIABA/MT","FERROVIARIA/SP","FERROVIARIO/CE","FIGUEIRENSE/SC","FLAMENGO/RJ","FLORESTA/CE","FLUMINENSE/RJ","FORTALEZA/CE","GOIAS/GO","GREMIO/RS","GUARANI/SP","INTERNACIONAL/RS","ITUANO/SP","JACUIPENSE/BA","JUAZEIRENSE/BA","JUVENTUDE/RS","LONDRINA/PR","MANAUS/AM","MIRASSOL/SP","NAUTICO/PE","NOVA IGUACU/RJ","NOVORIZONTINO/SP","OESTE/SP","OPERARIO/PR","PALMEIRAS/SP","PARANA/PR","PAYSANDU/PA","PONTE PRETA/SP","PORTUGUESA/RJ","POUSO ALEGRE/MG","REMO/PA","RETRO BRASIL/PE","SAMP CORREA/MA","SANTA CRUZ/PE","SANTOS/SP","SAO BERNARDO/SP","SAO JOSE/RS","SAO PAULO/SP","SAORAIMUNDO/RR","SPORT/PE","TOCANTINOPOLIS/TO","TOMBENSE/MG","VASCO DA GAMA/RJ","VILA NOVA/GO","VITORIA/BA","VOLTA REDONDA/RJ","YPIRANGA/RS"];
        
        const precos = {
            'MegaSena': {6: 6.00, 7: 42.00, 8: 168.00, 9: 504.00, 10: 1260.00, 11: 2772.00, 12: 5544.00, 13: 10296.00, 14: 18018.00, 15: 30030.00, 16: 48048.00, 17: 74256.00, 18: 111384.00, 19: 162792.00, 20: 232560.00}, 
            'Lotofacil': {15: 3.00, 16: 48.00, 17: 408.00, 18: 2448.00, 19: 11628.00, 20: 46512.00}, 
            'Quina': {5: 3.00, 6: 18.00, 7: 63.00, 8: 168.00, 9: 378.00, 10: 756.00, 11: 1386.00, 12: 2376.00, 13: 3861.00, 14: 6006.00, 15: 9009.00}, 
            'DuplaSena': {6: 2.50, 7: 17.50, 8: 70.00, 9: 210.00, 10: 525.00, 11: 1155.00, 12: 2310.00, 13: 4290.00, 14: 7507.50, 15: 12512.50}, 
            'Milionaria': {6: 6.00, 7: 42.00, 8: 168.00, 9: 504.00, 10: 1260.00, 11: 2772.00, 12: 5544.00}, 
            'Lotomania': {50: 3.00}, 
            'Timemania': {10: 3.50}
        };

        let textoParaWhatsApp = "";

        function gerarNumeros(max, qtd, offset = 1) {
            let nums = [];
            while(nums.length < qtd) {
                let n = Math.floor(Math.random() * max) + offset;
                if(!nums.includes(n)) nums.push(n);
            }
            return nums.sort((a,b) => a-b).map(n => n.toString().padStart(2, '0'));
        }

        function iniciar(tipo, max, minQtd, maxQtd) {
            let qtdJogos = prompt("Quantos jogos deseja gerar?", "5");
            if (!qtdJogos) return;
            let qtdNum = prompt(`Quantos números? (${minQtd} a ${maxQtd})`, minQtd);
            if (!qtdNum) return;
            let preco = precos[tipo][qtdNum] || 0;
            let html = "", soma = 0;
            
            textoParaWhatsApp = `🍀 *IA - Inteligência do Andrade* 🍀\n\n🎯 *Loteria:* ${tipo}\n\n`;

            for(let i = 0; i < qtdJogos; i++) {
                let nums = (tipo === 'Lotomania') ? gerarNumeros(100, 50, 0) : gerarNumeros(max, parseInt(qtdNum));
                let extraHtml = "";
                let extraWhats = "";

                if(tipo === 'Timemania') {
                    let timeSorteado = times[Math.floor(Math.random()*times.length)];
                    extraHtml = ` | Time: <b>${timeSorteado}</b>`;
                    extraWhats = ` | Time: ${timeSorteado}`;
                }
                if(tipo === 'Milionaria') {
                    let trevosSorteados = gerarNumeros(6, 2).join(' e ');
                    extraHtml = ` | Trevos: ${trevosSorteados}`;
                    extraWhats = ` | Trevos: ${trevosSorteados}`;
                }
                
                html += `<div class="linha-jogo">Jogo ${i+1}: <span class="numero">${nums.join(' - ')}</span>${extraHtml}</div>`;
                textoParaWhatsApp += `*Jogo ${i+1}:* ${nums.join(' - ')}${extraWhats}\n`;
                
                soma += preco;
            }

            let totalFormatado = "R$ " + soma.toFixed(2).replace('.', ',');
            
            textoParaWhatsApp += `\n💰 *Total do Bolão: ${totalFormatado}*\n`;
            textoParaWhatsApp += `\n🌐 *Gere seus jogos também acessando:*\n${window.location.href}`;

            document.getElementById('titulo-res').innerText = "Resultado " + tipo;
            document.getElementById('conteudo-res').innerHTML = html;
            document.getElementById('total-geral').innerText = totalFormatado;
            
            document.querySelector('.wrapper').style.display = 'none';
            document.getElementById('tela-resultado').style.display = 'block';
        }

        function enviarWhatsApp() {
            let textoCodificado = encodeURIComponent(textoParaWhatsApp);
            window.open(`https://wa.me/?text=${textoCodificado}`, '_blank');
        }

        function abrirCaixa() {
            window.open('https://www.loteriasonline.caixa.gov.br/', '_blank');
        }

        function voltar() {
            document.querySelector('.wrapper').style.display = 'flex';
            document.getElementById('tela-resultado').style.display = 'none';
        }
    </script>
</body>
</html>
